<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4e8ff"/>
      <stop offset="100%" stop-color="#eaf3ff"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b08ec4"/>
      <stop offset="100%" stop-color="#9670b0"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef6e8"/>
      <stop offset="100%" stop-color="#f5ead6"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec87e"/>
      <stop offset="100%" stop-color="#5eaa5e"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9670b0"/>
      <stop offset="100%" stop-color="#7a5a96"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="128" height="128" rx="20" fill="url(#sky)"/>

  <!-- clouds -->
  <ellipse cx="22" cy="18" rx="14" ry="7" fill="white" opacity="0.6"/>
  <ellipse cx="32" cy="16" rx="10" ry="6" fill="white" opacity="0.5"/>
  <ellipse cx="100" cy="22" rx="12" ry="6" fill="white" opacity="0.5"/>
  <ellipse cx="110" cy="20" rx="8" ry="5" fill="white" opacity="0.4"/>

  <!-- grass ground -->
  <ellipse cx="64" cy="116" rx="62" ry="18" fill="url(#grass)"/>

  <!-- house body (two-story feel) -->
  <rect x="26" y="48" width="76" height="56" rx="2" fill="url(#wall)" stroke="#c8a878" stroke-width="1"/>

  <!-- roof main -->
  <path d="M20 50 L64 18 L108 50 Z" fill="url(#roof)" stroke="#7a5a96" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- roof shingle lines -->
  <line x1="34" y1="42" x2="94" y2="42" stroke="#a07ab8" stroke-width="0.6" opacity="0.5"/>
  <line x1="28" y1="46" x2="100" y2="46" stroke="#a07ab8" stroke-width="0.6" opacity="0.5"/>
  <!-- roof highlight -->
  <path d="M42 40 L64 22 L86 40 Z" fill="#c4a0d8" opacity="0.3"/>

  <!-- dormer window (center top) -->
  <path d="M52 48 L64 34 L76 48 Z" fill="url(#roof)" stroke="#7a5a96" stroke-width="0.8"/>
  <rect x="57" y="38" width="14" height="10" rx="7" fill="#b8daf0" stroke="#7a5a96" stroke-width="0.8"/>
  <line x1="64" y1="38" x2="64" y2="48" stroke="#7a5a96" stroke-width="0.5"/>

  <!-- chimneys -->
  <rect x="34" y="24" width="7" height="16" rx="1" fill="#c8a898" stroke="#a08070" stroke-width="0.6"/>
  <rect x="33" y="22" width="9" height="3" rx="1" fill="#d4b8a8"/>
  <rect x="86" y="28" width="6" height="14" rx="1" fill="#c8a898" stroke="#a08070" stroke-width="0.6"/>
  <rect x="85" y="26" width="8" height="3" rx="1" fill="#d4b8a8"/>

  <!-- columns (porch) -->
  <rect x="46" y="76" width="3" height="28" rx="1" fill="#f0e8d8" stroke="#c8b898" stroke-width="0.5"/>
  <rect x="79" y="76" width="3" height="28" rx="1" fill="#f0e8d8" stroke="#c8b898" stroke-width="0.5"/>
  <!-- porch roof -->
  <rect x="43" y="74" width="42" height="3" rx="1" fill="#c4a0d4"/>

  <!-- door -->
  <rect x="54" y="78" width="20" height="26" rx="2" fill="url(#door)" stroke="#6a4a86" stroke-width="1"/>
  <!-- door glass -->
  <rect x="57" y="81" width="14" height="10" rx="1.5" fill="#b8daf0" opacity="0.5"/>
  <!-- door handle -->
  <circle cx="70" cy="94" r="1.5" fill="#f0d890" stroke="#c8a060" stroke-width="0.5"/>
  <!-- door steps -->
  <rect x="50" y="104" width="28" height="3" rx="1" fill="#d4b8c8"/>
  <rect x="48" y="107" width="32" height="3" rx="1" fill="#c8a8b8"/>

  <!-- left window (top) -->
  <rect x="30" y="54" width="14" height="12" rx="1.5" fill="#b8daf0" stroke="#7a5a96" stroke-width="0.8"/>
  <line x1="37" y1="54" x2="37" y2="66" stroke="#7a5a96" stroke-width="0.5"/>
  <line x1="30" y1="60" x2="44" y2="60" stroke="#7a5a96" stroke-width="0.5"/>
  <!-- left window sill -->
  <rect x="29" y="66" width="16" height="2" rx="0.5" fill="#c8b898"/>

  <!-- right window (top) -->
  <rect x="84" y="54" width="14" height="12" rx="1.5" fill="#b8daf0" stroke="#7a5a96" stroke-width="0.8"/>
  <line x1="91" y1="54" x2="91" y2="66" stroke="#7a5a96" stroke-width="0.5"/>
  <line x1="84" y1="60" x2="98" y2="60" stroke="#7a5a96" stroke-width="0.5"/>
  <!-- right window sill -->
  <rect x="83" y="66" width="16" height="2" rx="0.5" fill="#c8b898"/>

  <!-- left window (bottom) -->
  <rect x="30" y="80" width="14" height="14" rx="1.5" fill="#ffedb3" stroke="#7a5a96" stroke-width="0.8"/>
  <line x1="37" y1="80" x2="37" y2="94" stroke="#7a5a96" stroke-width="0.5"/>
  <line x1="30" y1="87" x2="44" y2="87" stroke="#7a5a96" stroke-width="0.5"/>

  <!-- right window (bottom) -->
  <rect x="84" y="80" width="14" height="14" rx="1.5" fill="#ffedb3" stroke="#7a5a96" stroke-width="0.8"/>
  <line x1="91" y1="80" x2="91" y2="94" stroke="#7a5a96" stroke-width="0.5"/>
  <line x1="84" y1="87" x2="98" y2="87" stroke="#7a5a96" stroke-width="0.5"/>

  <!-- flower boxes under top windows -->
  <rect x="29" y="68" width="16" height="4" rx="1" fill="#8b6e5e"/>
  <circle cx="32" cy="67" r="2.5" fill="#f0a0b8"/>
  <circle cx="37" cy="66" r="2.8" fill="#e890a8"/>
  <circle cx="42" cy="67" r="2.5" fill="#f0a0b8"/>
  <circle cx="34" cy="65" r="2" fill="#f5b8c8"/>
  <circle cx="40" cy="65" r="2" fill="#f5b8c8"/>

  <rect x="83" y="68" width="16" height="4" rx="1" fill="#8b6e5e"/>
  <circle cx="86" cy="67" r="2.5" fill="#f0a0b8"/>
  <circle cx="91" cy="66" r="2.8" fill="#e890a8"/>
  <circle cx="96" cy="67" r="2.5" fill="#f0a0b8"/>
  <circle cx="88" cy="65" r="2" fill="#f5b8c8"/>
  <circle cx="94" cy="65" r="2" fill="#f5b8c8"/>

  <!-- bushes -->
  <ellipse cx="20" cy="106" rx="10" ry="7" fill="#5eaa5e"/>
  <ellipse cx="16" cy="104" rx="7" ry="5" fill="#6eb86e"/>
  <ellipse cx="24" cy="103" rx="6" ry="5" fill="#78c478"/>

  <ellipse cx="108" cy="106" rx="10" ry="7" fill="#5eaa5e"/>
  <ellipse cx="104" cy="104" rx="7" ry="5" fill="#6eb86e"/>
  <ellipse cx="112" cy="103" rx="6" ry="5" fill="#78c478"/>

  <!-- small bushes near door -->
  <ellipse cx="44" cy="106" rx="5" ry="4" fill="#6eb86e"/>
  <ellipse cx="84" cy="106" rx="5" ry="4" fill="#6eb86e"/>

  <!-- path stones -->
  <path d="M58 110 Q60 118 56 124 L72 124 Q68 118 70 110 Z" fill="#d8d0c8" stroke="#c0b8a8" stroke-width="0.5"/>

  <!-- flowers near path -->
  <circle cx="50" cy="114" r="2" fill="#f0a0b8"/>
  <circle cx="48" cy="112" r="1.8" fill="#e890a8"/>
  <circle cx="52" cy="112" r="1.5" fill="#f5b8c8"/>

  <circle cx="78" cy="114" r="2" fill="#f0a0b8"/>
  <circle cx="80" cy="112" r="1.8" fill="#e890a8"/>
  <circle cx="76" cy="112" r="1.5" fill="#f5b8c8"/>

  <!-- flower leaves -->
  <ellipse cx="49" cy="116" rx="1.5" ry="0.8" fill="#5eaa5e"/>
  <ellipse cx="79" cy="116" rx="1.5" ry="0.8" fill="#5eaa5e"/>

  <!-- heart above door -->
  <path d="M64 72 C62.5 70 60 70 60 71.8 C60 73.5 64 76 64 76 C64 76 68 73.5 68 71.8 C68 70 65.5 70 64 72Z" fill="#e890a8" opacity="0.8"/>
</svg>
